[tools]
# Node.js
node = "26"

# Python
python = "latest"

# Go
go = "latest"

# Rust
rust = "latest"

# Terraform
terraform = "latest"

# Other tools
deno = "latest"
bun = "latest"

# CLI tools — installed per-user into ~/.local, so they work even on machines
# where you have no sudo / aren't an admin. Anything that genuinely needs root
# (system libs, podman, fish) stays in the apt/dnf package list instead.
ripgrep = "latest"
fd = "latest"
bat = "latest"
fzf = "latest"
jq = "latest"
yq = "latest"
gh = "latest"
# Pin neovim to the aqua backend: mise's default (vfox) plugin registry isn't
# always reachable and leaves nvim off PATH.
"aqua:neovim/neovim" = "latest"
lazygit = "latest"
delta = "latest"
fastfetch = "latest"
btop = "latest"
shellcheck = "latest"
rclone = "latest"
pandoc = "latest"
direnv = "latest"
usage = "latest"

[settings]
experimental = true

[settings.python]
# Use the standard (non-freethreaded) precompiled CPython build. mise's
# default freethreaded `*-stripped` tarballs ship without a `lib/` dir and
# fail to install ("Python installation is missing a `lib` directory").
precompiled_flavor = "install_only"
